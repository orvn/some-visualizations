name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run tsc --noEmit

      - name: build
        run: bun run build
